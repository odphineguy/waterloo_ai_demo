<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;justify-content:center;gap:clamp(10px,3vw,30px);flex-wrap:nowrap;max-width:660px;margin:0 auto;padding:10px 8px">
  <sc-for list="{{ steps }}" as="s" hint-placeholder-count="6">
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0">
      <div style="{{ s.dot }}">{{ s.badge }}</div>
      <div style="{{ s.label }}">{{ s.name }}</div>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:660,&quot;height&quot;:72},&quot;current&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1,&quot;max&quot;:6}}">
class Component extends DCLogic {
  renderVals() {
    const cur = Number(this.props.current) || 1;
    const defs = [['01','Address'],['02','Measure'],['03','Package'],['04','Style'],['05','Details'],['06','Design']];
    const base = 'width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 auto;transition:all .22s ease;';
    const steps = defs.map((d, i) => {
      const n = i + 1; let dot, label, badge;
      if (n < cur) { dot = base + 'background:#2f7339;color:#fff;border:1px solid #2f7339'; badge = '\u2713'; label = 'color:#2f7339;font-weight:700'; }
      else if (n === cur) { dot = base + 'background:#e4b83d;color:#183820;border:1px solid #b88c16;box-shadow:0 0 0 4px rgba(228,184,61,.22)'; badge = d[0]; label = 'color:#183820;font-weight:800'; }
      else { dot = base + 'background:#eef3ea;color:#9aa79a;border:1px solid #dbe3d5'; badge = d[0]; label = 'color:#9aa79a;font-weight:600'; }
      label = 'font-size:11px;white-space:nowrap;letter-spacing:.01em;' + label;
      return { name: d[1], badge, dot, label };
    });
    return { steps };
  }
}
</script>
</body>
</html>
